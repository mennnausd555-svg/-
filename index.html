<!doctype html>
<html lang="en" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abqareno AI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>" />
    <script>
      // Fix for 'Cannot set property fetch of #<Window> which has only a getter'
      // This happens when some libraries try to polyfill fetch in environments where it's read-only.
      (function() {
        try {
          const prop = 'fetch';
          const originalFetch = window.fetch;
          if (typeof originalFetch !== 'function') return;
          const boundFetch = originalFetch.bind(window);

          console.log('[FetchFix] Initial descriptor:', Object.getOwnPropertyDescriptor(window, prop));

          function patch(obj, name) {
            try {
              const descriptor = Object.getOwnPropertyDescriptor(obj, prop);
              if (!descriptor || descriptor.configurable) {
                Object.defineProperty(obj, prop, {
                  value: boundFetch,
                  writable: true,
                  configurable: true,
                  enumerable: true
                });
                console.log(`[FetchFix] Patched ${name} successfully`);
                return true;
              }
              console.warn(`[FetchFix] Could not patch ${name}: descriptor is not configurable`, descriptor);
              
              // If it's a getter and not configurable, we might be stuck unless we can patch the prototype
              if (descriptor.get && !descriptor.set) {
                console.error(`[FetchFix] ${name}.fetch is a getter-only and non-configurable!`);
              }
            } catch (e) {
              console.error(`[FetchFix] Error patching ${name}:`, e);
            }
            return false;
          }

          // Try patching window, globalThis, self
          patch(window, 'window');
          patch(globalThis, 'globalThis');
          patch(self, 'self');
          
          // Also try patching the prototype
          if (window.Window && window.Window.prototype) {
            patch(window.Window.prototype, 'Window.prototype');
          }

          // Global error handler to catch and ignore this specific error if it still happens
          window.addEventListener('error', function(event) {
            if (event.error && event.error.message && event.error.message.includes('Cannot set property fetch')) {
              console.warn('Caught and suppressed fetch assignment error:', event.error.message);
              event.preventDefault();
              event.stopPropagation();
            }
          }, true);
        } catch (e) {
          console.error('[FetchFix] Fatal error in polyfill fix:', e);
        }
      })();
    </script>
  </head>
  <body style="margin: 0; background: #050505;">
    <!-- Initial Splash Screen -->
    <div id="splash-screen" style="position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #050505; transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1); overflow: hidden;">
      <!-- Background Glow -->
      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; background: rgba(0, 102, 255, 0.1); border-radius: 50%; filter: blur(120px); animation: pulse 3s infinite ease-in-out;"></div>
      
      <div style="position: relative; width: 300px; height: 300px; animation: logoPulse 3s infinite ease-in-out;">
        <svg viewBox="0 0 1024 1024" style="width: 100%; height: 100%; filter: drop-shadow(0 0 30px rgba(0,102,255,0.15));" xmlns="http://www.w3.org/2000/svg">
          <path d="M512 128C400 128 300 180 256 260C220 260 192 288 192 324C192 360 220 388 256 388C256 420 270 450 300 470C250 500 220 550 220 600C220 720 320 820 440 820C460 820 480 815 500 805C505 810 512 815 520 815C528 815 535 810 540 805C560 815 580 820 600 820C720 820 820 720 820 600C820 550 790 500 740 470C770 450 784 420 784 388C820 388 848 360 848 324C848 288 820 260 784 260C740 180 640 128 528 128C520 128 512 128 512 128Z" fill="#2D328F" />
          <path d="M512 128C512 128 530 200 500 280C480 340 520 400 512 450" stroke="#050505" stroke-width="12" stroke-linecap="round" fill="none" />
          <circle cx="360" cy="580" r="140" fill="#050505" />
          <circle cx="664" cy="580" r="140" fill="#050505" />
          <path d="M512 650C512 650 540 750 512 800C484 750 512 650 512 650Z" fill="#050505" />
          <g id="splash-circuits">
            <path d="M350 250 L420 300 L380 360" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" class="c-1" />
            <circle cx="380" cy="360" r="6" fill="#FFFFFF" class="c-1" />
            <path d="M280 340 L320 400" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" class="c-2" />
            <circle cx="320" cy="400" r="6" fill="#FFFFFF" class="c-2" />
            <path d="M450 200 L480 260" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" class="c-3" />
            <circle cx="480" cy="260" r="6" fill="#FFFFFF" class="c-3" />
            <path d="M650 220 L580 280 L620 340" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" class="c-4" />
            <circle cx="620" cy="340" r="6" fill="#FFFFFF" class="c-4" />
            <path d="M720 320 L680 380" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" class="c-5" />
            <circle cx="680" cy="380" r="6" fill="#FFFFFF" class="c-5" />
            <path d="M550 180 L530 240" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" class="c-6" />
            <circle cx="530" cy="240" r="6" fill="#FFFFFF" class="c-6" />
          </g>
        </svg>
      </div>

      <style>
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @keyframes splashGlow {
          0%, 100% { opacity: 0.15; filter: drop-shadow(0 0 0px #0066FF); stroke: #FFFFFF; fill: #FFFFFF; }
          15% { opacity: 1; filter: drop-shadow(0 0 15px #0066FF) drop-shadow(0 0 25px #0066FF); stroke: #0066FF; fill: #0066FF; }
          30% { opacity: 0.15; filter: drop-shadow(0 0 0px #0066FF); stroke: #FFFFFF; fill: #FFFFFF; }
        }
        #splash-circuits path, #splash-circuits circle { animation: splashGlow 4.8s infinite; opacity: 0.15; }
        .c-1 { animation-delay: 0s; } .c-2 { animation-delay: 0.8s; } .c-3 { animation-delay: 1.6s; }
        .c-4 { animation-delay: 2.4s; } .c-5 { animation-delay: 3.2s; } .c-6 { animation-delay: 4s; }
      </style>

      <script>
        window.addEventListener('load', function() {
          const splash = document.getElementById('splash-screen');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => {
              splash.style.display = 'none';
            }, 800);
          }
        });
      </script>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
